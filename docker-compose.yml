services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: stocksense-backend

    ports:
      - "8000:8000"

    environment:
      APP_NAME: "StockSense AI"
      APP_VERSION: "1.0.0"
      DEBUG: "false"

    restart: unless-stopped


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

      args:
        VITE_API_BASE_URL: "http://127.0.0.1:8000"

    container_name: stocksense-frontend

    ports:
      - "8080:80"

    depends_on:
      - backend

    restart: unless-stopped